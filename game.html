<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Afro Bingo - Game</title>
    <!-- Link to the Design System CSS -->
    <link rel="stylesheet" href="afro-bingo-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>


    <!-- Game Container -->
    <div class="container" style="padding: 16px;">
        
        <!-- Stats Row (Timer, Wallet, Stake) -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Timer</div>
                <div class="stat-value orange" id="countdown-timer">18</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Wallet</div>
                <div class="stat-value" id="wallet-balance">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Stake</div>
                <div class="stat-value" id="game-prize-pool">10</div>
            </div>
        </div>

        <!-- Board Counter -->
        <div style="font-size: 12px; color: var(--accent-green); font-weight: 500; margin-bottom: 8px;">
            Boards: 0/1
        </div>

        <!-- ==================== WAITING SCREEN (Card Selection) ==================== -->
        <div id="waiting-screen" class="screen active">
            <div id="phase-error-message" style="display:none; background:#fff; border-radius:12px; padding:10px; margin-bottom:12px; color:var(--accent-red); border:1px solid var(--accent-red); text-align:center;">
                <i class="fas fa-exclamation-triangle"></i> <span id="phase-error-text">Card purchase only during purchase phase</span>
            </div>
            
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <div style="font-size: 14px; font-weight: 600;"><i class="fas fa-shopping-cart" style="color:var(--brand-primary);"></i> Select Board</div>
                    <div style="font-size: 11px; color:var(--text-muted);">Price: <span style="color:var(--brand-primary); font-weight:600">10 birr</span></div>
                </div>
                
                <div class="cards-grid" id="cards-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap:6px; max-height:400px; overflow-y:auto; margin-bottom:10px;">
                    <!-- Grid generated by JS -->
                </div>

                <div style="display: flex; gap: 8px; font-size: 11px; color: var(--text-muted);">
                    <span><span style="display:inline-block; width:10px; height:10px; background:#8B4513; border-radius:50%;"></span> Available</span>
                    <span><span style="display:inline-block; width:10px; height:10px; background:#fff; border:1px solid #ccc; border-radius:50%;"></span> Sold</span>
                    <span><span style="display:inline-block; width:10px; height:10px; background:#2ECC71; border-radius:50%;"></span> Yours</span>
                </div>
            </div>

            <div class="selected-card-info" id="selected-card-info" style="display:none;">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><strong>Your Card:</strong> <span id="selected-card-id">#0</span></div>
                        <div style="color:var(--accent-orange); font-weight:600;">10 birr</div>
                    </div>
                    <div style="font-size:11px; color:var(--text-muted); margin-bottom:12px;">8 birr to prize pool</div>
                    
                    <div style="background: #f9f9f9; border-radius:12px; padding:12px; display:flex; justify-content:center;">
                        <div class="card-preview-grid" id="card-preview-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:4px; width:160px; height:160px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== ACTIVE GAME SCREEN ==================== -->
        <div id="game-screen" class="screen">
            <div class="game-grid-container">
                <!-- Master Bingo Board -->
                <div class="bingo-grid-container">
                    <div class="bingo-header-row" style="display:flex; margin-bottom:5px;">
                        <div class="bingo-header-cell" style="flex:1; text-align:center; font-weight:700; font-size:13px; color:var(--brand-primary);">B</div>
                        <div class="bingo-header-cell" style="flex:1; text-align:center; font-weight:700; font-size:13px; color:var(--accent-green);">I</div>
                        <div class="bingo-header-cell" style="flex:1; text-align:center; font-weight:700; font-size:13px; color:var(--accent-orange);">N</div>
                        <div class="bingo-header-cell" style="flex:1; text-align:center; font-weight:700; font-size:13px; color:#E74C3C;">G</div>
                        <div class="bingo-header-cell" style="flex:1; text-align:center; font-weight:700; font-size:13px; color:var(--brand-secondary);">O</div>
                    </div>
                    <div class="bingo-numbers-columns" id="bingo-grid" style="display:flex; gap:3px;"></div>
                </div>

                <!-- Player Board -->
                <div class="player-card-and-button-container" style="display:flex; flex-direction:column; gap:10px;">
                    <div class="player-card-container">
                        <div style="font-size:11px; color:var(--text-muted); display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:6px; margin-bottom:8px;">
                            <span><i class="fas fa-id-card"></i> My Board</span>
                            <span>#<span id="player-card-id">0</span></span>
                        </div>
                        <div class="player-card-header-row" style="display:grid; grid-template-columns:repeat(5,1fr); gap:4px; text-align:center; font-weight:600; font-size:12px; color:var(--text-muted); margin-bottom:4px;">
                            <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
                        </div>
                        <div class="player-card-grid" id="player-card-grid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:4px; flex:1;"></div>
                    </div>
                    
                    <button class="btn-primary" onclick="window.claimBingo()" id="claim-bingo-btn" disabled>
                        <i class="fas fa-bell"></i> BINGO
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="game.html" class="nav-item active"><i class="fas fa-gamepad"></i><span>Game</span></a>
        <a href="history.html" class="nav-item"><i class="fas fa-clock"></i><span>History</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <!-- SCRIPTS (Core Functionality) -->
    <script src="afro-bingo-core.js"></script>
</body>
</html>
