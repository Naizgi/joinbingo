<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Afro Bingo - History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* =========================================================
           AFRO BINGO DESIGN SYSTEM (Fully Integrated for History)
           ========================================================= */
        :root {
            --brand-primary: #6A0DAD;       /* Deep Purple */
            --brand-secondary: #B88CCF;     /* Secondary Purple */
            --brand-light: #E9D8F4;         /* Light Purple */
            --brand-bg: #CDA7D9;            /* Very Light Lavender (Background) */
            --surface-white: #FFFFFF;
            --shadow-soft: 0px 3px 10px rgba(106, 13, 173, 0.08);
            --radius-card: 20px;
            --radius-btn: 16px;
            --radius-tile: 8px;
            --accent-orange: #F68B1F;       /* Bingo numbers */
            --accent-green: #3BB54A;        /* Success / Win */
            --accent-red: #C62828;          /* Loss */
            --text-primary: #2B2B2B;
            --text-secondary: #6B6B6B;
            --text-muted: #A7A7A7;
            --text-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--brand-bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* --- Header --- */
        .app-header {
            height: 64px;
            background: var(--surface-white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid #f0f0f0;
            box-shadow: 0 2px 8px rgba(106, 13, 173, 0.04);
        }
        .app-header .title { font-size: 26px; font-weight: 700; color: var(--brand-primary); }
        .app-header i { font-size: 20px; color: var(--text-secondary); cursor: pointer; }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: var(--brand-light);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top-left-radius: 18px;
            border-top-right-radius: 18px;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -4px 12px rgba(106, 13, 173, 0.06);
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 100%;
            text-decoration: none;
            color: var(--brand-primary);
            transition: all 0.2s ease;
        }
        .nav-btn i { font-size: 22px; margin-bottom: 4px; }
        .nav-btn span { font-size: 12px; font-weight: 500; }
        .nav-btn.active {
            background: var(--brand-primary);
            color: var(--text-white);
            border-radius: 18px;
            height: 50px;
            width: 70px;
            margin-top: -10px;
            box-shadow: 0 4px 12px rgba(106, 13, 173, 0.3);
        }
        .nav-btn.active i, .nav-btn.active span { color: var(--text-white); }

        /* --- Components --- */
        .card {
            background: var(--surface-white);
            border-radius: var(--radius-card);
            padding: 16px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 12px;
        }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        
        .btn-secondary {
            background: var(--surface-white);
            color: var(--brand-primary);
            border: 1px solid var(--brand-primary);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* History Specifics */
        .history-badge { padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; display: inline-block; }
        .history-badge.loss { background: #fce4ec; color: var(--accent-red); }
        .history-badge.win { background: #e8f5e9; color: var(--accent-green); }
        
        /* Overlays */
        #access-denied { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a2e; color:white; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
    </style>
</head>
<body>

    <!-- ==================== OVERLAYS ==================== -->
    <div id="access-denied">
        <i class="fas fa-lock" style="font-size: 50px; color: #f44336; margin-bottom: 20px"></i>
        <h2>Access Restricted</h2>
        <p>This game can only be played inside the Telegram App.</p>
    </div>

    <!-- ==================== PAGE HEADER ==================== -->
    <header class="app-header">
        <i class="fas fa-times"></i>
        <span class="title">History</span>
        <i class="fas fa-ellipsis-v"></i>
    </header>

    <!-- ==================== PAGE CONTENT ==================== -->
    <div style="padding: 16px;">
        
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <span class="card-title" style="margin:0;">GAME HISTORY</span>
            <button class="btn-secondary"><i class="fas fa-sync-alt"></i> Reload</button>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 8px;">
                <span style="font-weight: 600; font-size: 14px; color: var(--text-primary);">Game #2XKFRER9</span>
                <span class="history-badge loss">LOSS</span>
            </div>
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">2026-04-15, 6:11:16 p.m.</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; color: var(--text-secondary);">
                <div>Stake: <span style="font-weight:600; color:var(--text-primary);">Br 10.00</span></div>
                <div>Prize: <span style="font-weight:600; color:var(--text-primary);">Br 2,096.00</span></div>
                <div>My Boards: <span style="font-weight:600; color:var(--text-primary);">#80</span></div>
                <div>Winners: <span style="font-weight:600; color:var(--text-primary);">#168, #224</span></div>
            </div>
            <div style="font-size: 11px; color: var(--text-muted); margin-top: 8px; border-top: 1px solid #f9f9f9; padding-top: 8px;">Winner count: 2</div>
        </div>
        
        <div style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 12px;">Showing recent 20 games</div>

    </div>

    <!-- ==================== BOTTOM NAVIGATION ==================== -->
    <nav class="bottom-nav">
        <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i><span>Game</span></a>
        <a href="history.html" class="nav-item active"><i class="fas fa-clock"></i><span>History</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script src="afro-bingo-core.js"></script>
</body>
</html>
