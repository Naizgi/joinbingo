<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Afro Bingo - Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* =========================================================
           AFRO BINGO DESIGN SYSTEM (Integrated for Wallet)
           ========================================================= */
        :root {
            --brand-primary: #6A0DAD;       /* Deep Purple */
            --brand-secondary: #B88CCF;     /* Secondary Purple */
            --brand-light: #E9D8F4;         /* Light Purple */
            --brand-bg: #CDA7D9;            /* Very Light Lavender (Background) */
            --surface-white: #FFFFFF;
            --shadow-soft: 0px 3px 10px rgba(106, 13, 173, 0.08);
            --radius-card: 20px;
            --radius-btn: 16px;
            --radius-tile: 8px;
            --accent-orange: #F68B1F;       /* Bingo numbers */
            --accent-green: #3BB54A;        /* Success / Win */
            --accent-red: #C62828;          /* Loss */
            --text-primary: #2B2B2B;
            --text-secondary: #6B6B6B;
            --text-muted: #A7A7A7;
            --text-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--brand-bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* --- Header --- */
        .app-header {
            height: 64px;
            background: var(--surface-white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid #f0f0f0;
            box-shadow: 0 2px 8px rgba(106, 13, 173, 0.04);
        }
        .app-header .title { font-size: 26px; font-weight: 700; color: var(--brand-primary); }
        .app-header i { font-size: 20px; color: var(--text-secondary); cursor: pointer; }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: var(--brand-light);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top-left-radius: 18px;
            border-top-right-radius: 18px;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -4px 12px rgba(106, 13, 173, 0.06);
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 100%;
            text-decoration: none;
            color: var(--brand-primary);
            transition: all 0.2s ease;
        }
        .nav-btn i { font-size: 22px; margin-bottom: 4px; }
        .nav-btn span { font-size: 12px; font-weight: 500; }
        .nav-btn.active {
            background: var(--brand-primary);
            color: var(--text-white);
            border-radius: 18px;
            height: 50px;
            width: 70px;
            margin-top: -10px;
            box-shadow: 0 4px 12px rgba(106, 13, 173, 0.3);
        }
        .nav-btn.active i, .nav-btn.active span { color: var(--text-white); }

        /* --- Wallet Components --- */
        .card {
            background: var(--surface-white);
            border-radius: var(--radius-card);
            padding: 16px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 12px;
        }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        
        .btn-secondary {
            background: var(--surface-white);
            color: var(--brand-primary);
            border: 1px solid var(--brand-primary);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Highlight Card (Deep Purple Gradient) */
        .wallet-highlight-card {
            background: linear-gradient(135deg, var(--brand-primary), #8A2BE2);
            border-radius: var(--radius-card);
            padding: 16px;
            color: var(--text-white);
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(106, 13, 173, 0.3);
        }
        
        /* 3 Column Stats */
        .wallet-stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .wallet-stat-box {
            background: var(--surface-white);
            border-radius: var(--radius-btn);
            padding: 12px;
            text-align: center;
            box-shadow: var(--shadow-soft);
        }

        /* --- Overlays --- */
        #access-denied { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a2e; color:white; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
    </style>
</head>
<body>

    <!-- ==================== OVERLAYS ==================== -->
    <div id="access-denied">
        <i class="fas fa-lock" style="font-size: 50px; color: #f44336; margin-bottom: 20px"></i>
        <h2>Access Restricted</h2>
        <p>This game can only be played inside the Telegram App.</p>
    </div>

    <!-- ==================== APP HEADER ==================== -->
    <header class="app-header">
        <i class="fas fa-times"></i>
        <span class="title">Wallet</span>
        <i class="fas fa-ellipsis-v"></i>
    </header>

    <!-- ==================== PAGE CONTENT ==================== -->
    <div style="padding: 16px;">
        
        <!-- Wallet Card (White) -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                <span class="card-title">WALLET</span>
                <button class="btn-secondary"><i class="fas fa-sync-alt"></i> Reload</button>
            </div>
            <div style="font-size: 28px; font-weight: 700; color: var(--brand-primary);">Br 0.00</div>
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;">Total balance</div>
            
            <!-- Tabs -->
            <div style="display: flex; gap: 10px;">
                <div style="background: var(--brand-primary); color: white; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;">BALANCES</div>
                <div style="background: var(--brand-light); color: var(--text-secondary); padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;">HISTORY</div>
            </div>
        </div>

        <!-- Highlight Card (Deep Purple) -->
        <div class="wallet-highlight-card">
            <div style="font-size: 12px; opacity: 0.8;">TOTAL BALANCE</div>
            <div style="font-size: 26px; font-weight: 700; margin-top: 4px;">Br 0.00</div>
        </div>

        <!-- 3 Column Stats -->
        <div class="wallet-stat-grid">
            <div class="wallet-stat-box">
                <div style="font-weight: 700; font-size: 16px; color: var(--text-primary);">Br 0.00</div>
                <div style="font-size: 10px; color: var(--text-muted);">MAIN</div>
            </div>
            <div class="wallet-stat-box">
                <div style="font-weight: 700; font-size: 16px; color: var(--text-primary);">Br 0.00</div>
                <div style="font-size: 10px; color: var(--text-muted);">BONUS</div>
            </div>
            <div class="wallet-stat-box">
                <div style="font-weight: 700; font-size: 16px; color: var(--text-primary);">Br 0.00</div>
                <div style="font-size: 10px; color: var(--text-muted);">DEPOSITED</div>
            </div>
        </div>

    </div>

    <!-- ==================== BOTTOM NAVIGATION ==================== -->
    <nav class="bottom-nav">
        <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i><span>Game</span></a>
        <a href="history.html" class="nav-item"><i class="fas fa-clock"></i><span>History</span></a>
        <a href="wallet.html" class="nav-item active"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script src="afro-bingo-core.js"></script>
</body>
</html>
